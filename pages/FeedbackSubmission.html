<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Project</title>
    <link rel="stylesheet" href="../styles/Feedback.css" />
  </head>

  <body>
    <!-- header -->
    <header class="header">
      <div class="header-left">
        <!-- logo leading to homepage -->
        <div class="logo" onclick="window.location.href='../index.html'" style="cursor:pointer;">Lenovo</div>
          <button class="back-btn">
            <img src="../images/arrow.png" alt="Back" class="header-icon" />
          </button>

        <!-- Search bar with dropdown -->
        <div class="search-bar">
          <input type="text" placeholder="Search" />

          <!-- Search dropdown: same style as FeedDropdown -->
          <div class="SearchDropdown">
            <button class="searchDropBtn" id="searchDropBtn">Select ▼</button>
            <div class="searchSelection" id="searchDropMenu">
              <a href="#" onclick="selectSearch(event, 'Laptops')">Laptops</a>
              <a href="#" onclick="selectSearch(event, 'PC')">PC</a>
              <a href="#" onclick="selectSearch(event, 'Monitors')">Monitors</a>
            </div>
          </div>
        </div>
      </div>

      <!-- header buttons -->
      <div class="header-right">
          <button class="header-btn">
            <img src="../images/user.png" alt="Sign-in" class="header-icon" /> Sign-in / Create Account
          </button>
          <button class="header-btn">
            <img src="../images/shopping-cart.png" alt="My Cart" class="header-icon" /> My Cart
          </button>
          <button class="header-btn">
            <img src="../images/setting.png" alt="Settings" class="header-icon" /> Settings
          </button>
          <button class="theme-toggle" id="themeToggle">
            <img src="../images/moon.png" alt="Dark Mode" class="header-icon" />
          </button>
        </div>
    </header>

    <!-- the options under the header -->
    <nav class="nav">
      <a href="#">Laptop</a>
      <a href="#">Desktop</a>
      <a href="#">Software</a>
      <a href="#">Tablet</a>
      <a href="#">Accessories</a>
    </nav>

    <!-- feedback box -->
    <main class="content">
      <section class="feedbackBox">
        <div class="feedbackContainer">

          <!-- Close Button leading back to home -->
          <button class="closeBtn" id="closeBtn" onclick="window.location.href='../index.html'">&times;</button>

          <h1>Thank you for your Feedback!</h1>
        </div>
      </section>

      <script>
        // Js for search and X button
        
        // Search dropdown 
        const searchDropBtn = document.getElementById("searchDropBtn");
        const searchDropMenu = document.getElementById("searchDropMenu");

        searchDropBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          closeAll();
          searchDropMenu.classList.toggle("open");
        });

        function selectSearch(e, value) {
          e.preventDefault();
          searchDropBtn.textContent = value + " ▼";
          searchDropMenu.classList.remove("open");
        }
      </script>
    </main>
  </body>
</html>
