<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lenovo || Menu</title>
    <link rel="stylesheet" href="../../styles/mobileMenu.css" />
  </head>
  <body>

    <!-- header, the hamabuger menu was changed to the left (suggested by the TA) -->
    <header class="menu-header">

      <!-- hamburger on the left -->
      <button class="hamburger-btn" onclick="history.back()">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- back arrow next to the hamburger menu -->
      <button class="back-btn">
          <img src="../../images/arrow.png" alt="Back" class="header-icon" />
      </button>

        <!-- Search bar -->
        <div class="search-bar">
          <input type="text" placeholder="Search" />
          <a href="searchMobile.html" class="searchiconlink">
            <img src="../../images/search-interface-symbol.png" alt="Search" class="search-icon" />
          </a>
        </div>

        <!-- dark mode for later -->
        <button class="theme-toggle" id="themeToggle">
          <img src="../../images/sun-and-moon.png" alt="Toggle Theme" class="header-icon" style="width: 20px; height: 20px; object-fit: contain;" />
        </button>

    </header>


    <!-- items that are selectable -->
    <nav class="mobile-menu">

      <a href="indexMobile.html" class="menu-item">
        <img src="../../images/home.png" alt="Home" class="menu-icon" />
        <span>Home</span>
      </a>
      <hr class="menu-divider" />

      <a href="searchMobile.html" class="menu-item">
        <img src="../../images/search-interface-symbol.png" alt="Search" class="menu-icon" />
        <span>Search</span>
      </a>
      <hr class="menu-divider" />

      <a href="FeedbackMobile.html" class="menu-item">
        <img src="../../images/comment.png" alt="Feedback" class="menu-icon" />
        <span>Feedback</span>
      </a>
      <hr class="menu-divider" />

      <!-- wont be linked to anything -->
      <a href="#" class="menu-item">
        <img src="../../images/setting.png" alt="Settings" class="menu-icon" />
        <span>Settings</span>
      </a>
      <hr class="menu-divider" />

    </nav>
      <script src="../../scripts/mainScript.js"></script>
  </body>
</html>
