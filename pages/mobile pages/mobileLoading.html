<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <!-- makes the page scales properly on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Lenovo | Mobile Loading</title>

  <link rel="stylesheet" href="../../styles/mobileLoading.css" />
</head>
<body>

  <!-- top mobile navigation bar -->
  <header class="mobile-header">
    
    <!-- back button for navigation -->
    <button class="icon-button back-button" aria-label="Go back">&#8592;</button>

    <!-- search bar -->
    <div class="search-bar">
      <span class="search-icon"></span>
      <span class="search-text">Search</span>
    </div>

    <!-- hamburger menu button -->
    <button class="icon-button menu-button" aria-label="Open menu">&#9776;</button>
  </header>

  <!-- main content area -->
  <main class="loading-container">
    
    <!-- centered loading spinner -->
    <div class="spinner"></div>
  </main>

</body>
</html>
