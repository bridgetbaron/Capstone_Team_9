<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- makes the page scale properly on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Lenovo | Mobile Loading</title>

    <link rel="stylesheet" href="../../styles/mobileLoading.css" />
  </head>
  <body>
    <!-- top mobile header -->
    <header class="header">
      <div class="header-left">
        <!-- hamburger menu button -->
        <button class="hamburger-btn" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <!-- back button for navigation -->
        <button class="back-btn" aria-label="Go back">
          <img src="../../images/arrow.png" alt="Back" class="header-icon" />
        </button>

        <!-- search bar -->
        <div class="search-bar">
          <input type="text" placeholder="Search" aria-label="Search" />
        </div>
      </div>

      <!-- same theme button style used across the mobile pages -->
      <button class="theme-toggle" type="button" aria-label="Toggle theme">
        <img src="../../images/sun-and-moon.png" alt="Toggle Theme" class="header-icon" />
      </button>
    </header>

    <!-- main content area -->
    <main class="loading-container">
      <!-- centered loading spinner -->
      <div class="loading-box">
        <div class="spinner" aria-hidden="true"></div>
        <p>Loading...</p>
      </div>
    </main>
  </body>
</html>
