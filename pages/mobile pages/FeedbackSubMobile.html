<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Project</title>
    <link rel="stylesheet" href="../../styles/Feedback.css" />
  </head>

  <body>
    <!-- header -->
    <header class="header">
      <div class="header-left">
          <button class="hamburgerbtn" onclick="window.location.href='mobileMenu.html'">
            <span></span>
            <span></span>
            <span></span>
          </button>
        <button class="back-btn">
          <img src="../../images/arrow.png" alt="Back" class="header-icon" />
        </button>

        <!-- search bar -->
        <div class="search-bar">
          <input type="text" placeholder="Search" />
          <a href="searchMobile.html" class="searchiconlink">
            <img src="../../images/search-interface-symbol.png" alt="Search" class="search-icon" />
          </a>
        </div>

        <!-- dark mode for later -->
        <button class="themetoggle" id="themeToggle">
          <img src="../../images/sun-and-moon.png" alt="Toggle Theme" class="header-icon" />
        </button>

      
    </header>


      <!-- main box for feedback -->
      <main class="content">
        <section class="feedbackBox">
          <div class="feedbackContainer">
            <!-- close button x -->
            <button class="closeBtn" id="closeBtn" onclick="window.location.href='../../index.html'">&times;</button>

            <h1>Thank you for your Feedback!</h1>

          </div>
        </section>
    </main>
      <script src="../../scripts/mainScript.js"></script>
  </body>
</html>
