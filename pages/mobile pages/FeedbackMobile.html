<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Project</title>
    <link rel="stylesheet" href="../../styles/Feedback.css" />
  </head>

  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-left">
          <button class="hamburgerbtn" onclick="window.location.href='mobileMenu.html'">
            <span></span>
            <span></span>
            <span></span>
          </button>
            <button class="back-btn">
              <img src="../../images/arrow.png" alt="Back" class="header-icon" />
            </button>

        <!-- Search bar with dropdown -->
        <div class="search-bar">
          <input type="text" placeholder="Search" />

        </div>
      </div>

        <!-- dark mode for later -->
        <button class="themetoggle" id="themeToggle">
          <img src="../../images/sun-and-moon.png" alt="Toggle Theme" class="header-icon" />
        </button>

    </header>




    <!-- main box for feedback -->
    <main class="content">
      <section class="feedbackBox">
        <div class="feedbackContainer">
          <!-- Close Button X -->
          <button class="closeBtn" id="closeBtn" onclick="window.location.href='../index.html'">&times;</button>

          <h1>Feedback Form</h1>

          <p class="label">Any suggestions?</p>
          <textarea class="textBox" placeholder="Type here..."></textarea>

          <p class="label">What was your experience using our website?</p>

          <!-- The Feedback Dropdown -->
          <div class="FeedDropdown">
            <button class="dropBtn" id="dropBtn">Select ▼</button>
            <div class="selection" id="dropMenu">
              <a href="#" onclick="selectOption(event, 'Great')">Great</a>
              <a href="#" onclick="selectOption(event, 'Good')">Good</a>
              <a href="#" onclick="selectOption(event, 'Okay')">Okay</a>
              <a href="#" onclick="selectOption(event, 'Bad')">Bad</a>
            </div>
          </div>

          <!-- Submit button -->
          <div class="submitWrapper">
            <button class="submitBtn" onclick="window.location.href = 'FeedbackSubMobile.html'"> Submit </button>
          </div>
        </div>
      </section>
    </main>

    <script>
      // JS for the dropdowns and X button
      //  Feedback dropdown 
      const dropBtn = document.getElementById("dropBtn");
      const dropMenu = document.getElementById("dropMenu");

      dropBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        closeAll();
        dropMenu.classList.toggle("open");
      });

      function selectOption(e, value) {
        e.preventDefault();
        dropBtn.textContent = value + " ▼";
        dropMenu.classList.remove("open");
      }

      // Search dropdown 
      const searchDropBtn = document.getElementById("searchDropBtn");
      const searchDropMenu = document.getElementById("searchDropMenu");

      searchDropBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        closeAll();
        searchDropMenu.classList.toggle("open");
      });

      function selectSearch(e, value) {
        e.preventDefault();
        searchDropBtn.textContent = value + " ▼";
        searchDropMenu.classList.remove("open");
      }

      // Close all dropdowns when clicking outside 
      function closeAll() {
        dropMenu.classList.remove("open");
        searchDropMenu.classList.remove("open");
      }

      document.addEventListener("click", closeAll);

      // Close button 
      document
        .getElementById("closeBtn")
        .addEventListener("click", function () {
          document.querySelector(".feedbackBox").style.display = "none";
        });
    </script>
  </body>
</html>
