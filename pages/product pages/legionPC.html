<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legion Tower</title>
    <link rel="stylesheet" href="../../styles/Feedback.css" />
    <link rel="stylesheet" href="../../styles/product.css" />
  </head>
  <body>
    <!-- header -->
    <header class="header">
      <div class="header-left">
        <div
          class="logo"
          onclick="window.location.href = '../../index.html'"
          style="cursor: pointer"
        >
          Lenovo
        </div>
        <button class="back-btn">
          <img src="../../images/arrow.png" alt="Back" class="header-icon" />
        </button>

        <!-- search bar with dropdown -->
        <div class="search-bar">
          <div class="SearchDropdown">
            <button class="searchDropBtn" id="searchDropBtn">Select ▼</button>
            <div class="searchSelection" id="searchDropMenu">
              <a href="#" onclick="selectSearch(event, 'Laptops')">Laptops</a>
              <a href="#" onclick="selectSearch(event, 'PC')">PC</a>
              <a href="#" onclick="selectSearch(event, 'Monitors')">Monitors</a>
            </div>
          </div>
          <input type="text" placeholder="Search" />
          <a href="../../pages/searchResults.html" class="searchiconlink">
            <img
              src="../../images/search-interface-symbol.png"
              alt="Search"
              class="search-icon"
            />
          </a>
        </div>
      </div>

      <div class="header-right">
        <button class="header-btn" onclick="window.location.href='/pages/signIn.html'">
          <img src="../../images/user.png" alt="Sign-in" class="header-icon" />
          Sign-in / Create Account
        </button>
        <button class="header-btn" onclick="window.location.href='/pages/cart.html'">
          <img
            src="../../images/shopping-cart.png"
            alt="My Cart"
            class="header-icon"
          />
          My Cart
        </button>
        <button class="header-btn" onclick="window.location.href='/pages/settings.html'">
          <img
            src="../../images/setting.png"
            alt="Settings"
            class="header-icon"
          />
          Settings
        </button>
        <button class="theme-toggle" id="themeToggle">
          <img
            src="../../images/sun-and-moon.png"
            alt="Dark Mode"
            class="header-icon"
          />
        </button>
      </div>
    </header>

    <!-- nav -->
    <nav class="nav">
      <a href="../homeMoreResults.html">Laptop</a>
      <a href="../desktops.html">Desktop</a>
      <a href="../software.html">Software</a>
      <a href="../Accessories.html">Accessories</a>
    </nav>

    <!-- product content -->
    <main class="product-page">
      <!-- product image -->
      <div class="product-image-wrap">
        <img src="../../images/desktoplegion.png" alt="adobe" />
      </div>

      <!-- product info -->
      <div class="product-info">
        <div>
          <p class="product-category">Desktop</p>
          <h1 class="product-name">Legion Tower 5i Gen 10 (Intel) Gaming Desktop</h1>
          <p class="product-desc">
            Game & stream fast with superior performance of Intel® Core™ Ultra processors
          </p>
        </div>

        <div class="product-price-wrap">
          <p class="product-price">$3,284.99</p>
        </div>

        <button class="cart-btn" id="cartBtn">Add to cart</button>

        <p class="cart-confirm" id="cartConfirm">Added to cart</p>
      </div>
    </main>

    <script src="../../scripts/mainScript.js"></script>
    <script src="../../scripts/cart.js"></script>
  </body>
</html>
