<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- makes the page scale properly on different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Lenovo | Loading</title>

    <link rel="stylesheet" href="../styles/desktopLoading.css" />
  </head>
  <body>
    <!-- main desktop header -->
    <header class="header">
      <div class="header-left">
        <!-- brand/logo block -->
        <div class="logo" onclick="window.location.href='../index.html'" style="cursor: pointer;">
          Lenovo
        </div>

        <!-- back button -->
        <button class="back-btn" aria-label="Go back">
          <img src="../images/arrow.png" alt="Back" class="header-icon" />
        </button>

        <!-- search area -->
        <div class="search-bar">
          <input type="text" placeholder="Search" aria-label="Search" />

          <!-- simple dropdown placeholder -->
          <div class="SearchDropdown">
            <button class="searchDropBtn" type="button">Select ▼</button>
          </div>
        </div>
      </div>

      <!-- utility links on the right -->
      <div class="header-right">
        <button class="header-btn" type="button">
          onclick="window.location.href='/pages/signIn.html'">
          <img src="../images/user.png" alt="Sign-in" class="header-icon" />
          Sign-in / Create Account
        </button>

        <button class="header-btn" type="button" onclick="window.location.href='cart.html'">
          <img src="../images/shopping-cart.png" alt="My Cart" class="header-icon" />
          My Cart
        </button>

        <button class="header-btn" type="button">
          onclick="window.location.href='/pages/settings.html'">
          <img src="../images/setting.png" alt="Settings" class="header-icon" />
          Settings
        </button>

        <!-- theme toggle placeholder -->
        <button class="theme-toggle" type="button" aria-label="Toggle theme">
          <img src="../images/sun-and-moon.png" alt="Theme Toggle" class="header-icon" />
        </button>
      </div>
    </header>

    <!-- main product navigation row -->
    <nav class="nav">
      <a href="homeMoreResults.html">Laptop</a>
      <a href="desktops.html">Desktop</a>
      <a href="software.html">Software</a>
      <a href="Accessories.html">Accessories</a>
    </nav>

    <!-- main loading state -->
    <main class="loading-content">
      <div class="loading-box">
        <div class="spinner" aria-hidden="true"></div>
        <p>Loading results...</p>
      </div>
    </main>
  </body>
</html>
