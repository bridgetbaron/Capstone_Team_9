<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Project</title>
    <link rel="stylesheet" href="design/Feedback.css" />
  </head>

  <body>
    <header class="header">
      <div class="logo">My Website</div>

      <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Explore</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
    </header>
    
    <main class="content"></main>
        <section class="feedbackBox">
            <div class="feedbackContainer">
              <button class="closeBtn">&times;</button>
                <h1><center>FeedBack Form</center></h1>

                <p>Any Suggestions?</p>
                <textarea placeholder="Type here..."></textarea>
                <p>What was your experience using our website?</p>

                <div class="FeedDropdown">
                  <button>Select ▼</button>
                  <div class="selection">
                    <a href="">Great</a>
                    <a href="">Good</a>
                    <a href="">Okay</a>
                    <a href="">Bad</a>
                  </div>
                </div>

                <center>
                  <button><a href="FeedbackSubmission.html">Submit</a></button>
                </center>
            
            </div>
        </section>
    </main> 
  </body>
