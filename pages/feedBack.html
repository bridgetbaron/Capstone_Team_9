<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Project</title>
    <link rel="stylesheet" href="../styles/Feedback.css" />
  </head>

  <body>
    <!-- header -->
    <header class="header">
      <div class="header-left">
        <div
          class="logo"
          onclick="window.location.href = '../index.html'"
          style="cursor: pointer"
        >
          Lenovo
        </div>
        <button class="back-btn">
          <img src="../images/arrow.png" alt="Back" class="header-icon" />
        </button>

        <!-- search bar with dropdown -->
        <div class="search-bar">
          <!-- search dropdown: same style as feeddropdown -->
          <div class="SearchDropdown">
            <button class="searchDropBtn" id="searchDropBtn">Select ▼</button>
            <div class="searchSelection" id="searchDropMenu">
              <a href="#" onclick="selectSearch(event, 'Laptops')">Laptops</a>
              <a href="#" onclick="selectSearch(event, 'PC')">PC</a>
              <a href="#" onclick="selectSearch(event, 'Monitors')">Monitors</a>
            </div>
          </div>
          <input type="text" placeholder="Search" />
          <a href="searchResults.html" class="searchiconlink">
            <img
              src="../images/search-interface-symbol.png"
              alt="Search"
              class="search-icon"
            />
          </a>
        </div>
      </div>

      <div class="header-right">
        <button class="header-btn">
          <img src="../images/user.png" alt="Sign-in" class="header-icon" />
          Sign-in / Create Account
        </button>
        <button class="header-btn" onclick="window.location.href='cart.html'">
          <img
            src="../images/shopping-cart.png"
            alt="My Cart"
            class="header-icon"
          />
          My Cart
        </button>
        <button class="header-btn">
          <img src="../images/setting.png" alt="Settings" class="header-icon" />
          Settings
        </button>
        <button class="themetoggle" id="themeToggle">
          <img
            src="../images/sun-and-moon.png"
            alt="Dark Mode"
            class="header-icon"
          />
        </button>
      </div>
    </header>

    <!-- header nav -->
    <nav class="nav">
      <a href="homeMoreResults.html">Laptop</a>
      <a href="desktops.html">Desktop</a>
      <a href="software.html">Software</a>
      <a href="Accessories.html">Accessories</a>
    </nav>

    <!-- main box for feedback -->
    <main class="content">
      <section class="feedbackBox">
        <div class="feedbackContainer">
          <!-- close button x -->
          <button
            class="closeBtn"
            id="closeBtn"
            onclick="window.location.href = '../index.html'"
          >
            &times;
          </button>

          <h1>Feedback Form</h1>

          <p class="label">Please enter your email</p>
          <input type="email" class="textBoxEmail" id="emailInput" placeholder="Enter your email" />
          <p class="email-error" id="emailError">Please enter your email</p>

          <p class="label">Any suggestions?</p>
          <textarea class="textBox" placeholder="Type here..."></textarea>

          <p class="label">What was your experience using our website?</p>

          <!-- the feedback dropdown -->
          <div class="FeedDropdown">
            <button class="dropBtn" id="dropBtn">Select ▼</button>
            <div class="selection" id="dropMenu">
              <a href="#" onclick="selectOption(event, 'Great')">Great</a>
              <a href="#" onclick="selectOption(event, 'Good')">Good</a>
              <a href="#" onclick="selectOption(event, 'Okay')">Okay</a>
              <a href="#" onclick="selectOption(event, 'Bad')">Bad</a>
            </div>
          </div>

          <!-- submit button -->
          <div class="submitWrapper">
            <button class="submitBtn" type="button">Submit</button>
          </div>
        </div>
      </section>
    </main>
    <script src="../scripts/mainScript.js"></script>
  </body>
</html>
